# 오라클 클라우드 서버에서 이 파일 하나로 DB + 백엔드를 함께 띄워요.
# 사용법: docker compose up -d --build

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: headache_log
      POSTGRES_USER: headache_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data # 컨테이너를 껐다 켜도 데이터가 안 사라지게 저장
    ports:
      - "127.0.0.1:5432:5432" # 서버 안에서만 접근 가능 (외부 노출 안 함)

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://headache_user:${DB_PASSWORD}@db:5432/headache_log
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000" # nginx가 이 포트로만 연결하게 해요

volumes:
  pgdata:
