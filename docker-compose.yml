# 오라클 클라우드 서버에서 백엔드를 띄우는 설정.
# DB는 서버에 직접 안 띄우고 TiDB Cloud(관리형)를 써요 — .env의 DATABASE_URL로 연결.
# 사용법: docker compose up -d --build

services:
  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env # DATABASE_URL(TiDB), GOOGLE_CLIENT_ID, JWT_SECRET, FRONTEND_URL
    ports:
      - "127.0.0.1:8000:8000" # nginx가 이 포트로만 연결하게 해요
