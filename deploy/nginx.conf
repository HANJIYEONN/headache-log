# 오라클 서버의 /etc/nginx/sites-available/headache-log 로 복사해서 써요.
# nginx = 외부에서 오는 요청을 백엔드(8000번 포트)로 전달해주는 문지기.
# 80번(http) 포트로 들어온 요청을 로컬 8000번(FastAPI 컨테이너)으로 넘겨줘요.

server {
    listen 80;
    server_name _;  # 도메인 생기면 여기에 예: api.example.com

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
